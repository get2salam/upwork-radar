name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lead engine tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check browser modules
        run: |
          node --check js/lead-engine.js
          node --check js/main.js
      - name: Run unit tests
        run: node --test tests/*.test.mjs
