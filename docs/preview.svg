<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Upwork Radar preview</title>
  <desc id="desc">A mint freelance lead board with budget scoring, deadline queue, and proposal preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091511" />
      <stop offset="100%" stop-color="#050b09" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ee7b7" />
      <stop offset="100%" stop-color="#99f6e4" />
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" />
  <rect x="36" y="32" width="888" height="84" rx="24" fill="#0c1816" stroke="#245247" />
  <text x="66" y="72" font-family="Inter, Arial, sans-serif" font-size="28" fill="#eef2ff">Upwork Radar</text>
  <text x="66" y="96" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b7c0d9">Budget, deadline, win chance, and proposal angle in a focused freelance shortlist.</text>

  <rect x="36" y="138" width="888" height="118" rx="28" fill="#0c1816" stroke="#245247" />
  <rect x="62" y="164" width="184" height="68" rx="18" fill="#10211d" stroke="#245247" />
  <rect x="264" y="164" width="184" height="68" rx="18" fill="#10211d" stroke="#245247" />
  <rect x="466" y="164" width="184" height="68" rx="18" fill="#10211d" stroke="#245247" />
  <rect x="668" y="164" width="230" height="68" rx="18" fill="#10211d" stroke="#245247" />
  <text x="84" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Leads</text>
  <text x="84" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">21</text>
  <text x="286" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Live pipeline</text>
  <text x="286" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">$18.6k</text>
  <text x="488" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Applying now</text>
  <text x="488" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">4</text>
  <text x="690" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Average win chance</text>
  <text x="690" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">6.9 / 10</text>

  <rect x="36" y="278" width="522" height="226" rx="28" fill="#0c1816" stroke="#245247" />
  <text x="62" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">Lead board</text>
  <text x="62" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Choose the jobs that fit your edge before you write a proposal.</text>
  <rect x="62" y="356" width="470" height="54" rx="18" fill="#10211d" stroke="#245247" />
  <text x="84" y="388" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Legal AI prototype request</text>
  <text x="330" y="388" font-family="Inter, Arial, sans-serif" font-size="12" fill="#c9fff0">$3.2k · 8/10 fit</text>

  <rect x="62" y="422" width="470" height="54" rx="18" fill="#10211d" stroke="#245247" />
  <text x="84" y="454" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Large scraping rebuild</text>
  <text x="292" y="454" font-family="Inter, Arial, sans-serif" font-size="12" fill="#c9fff0">Applying · deadline 27 Apr</text>

  <rect x="584" y="278" width="340" height="226" rx="28" fill="#0c1816" stroke="#245247" />
  <text x="610" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">Proposal snapshot</text>
  <text x="610" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">A sharper pitch starts with the right angle, not a generic opener.</text>
  <rect x="610" y="356" width="288" height="72" rx="16" fill="#10211d" stroke="#245247" />
  <text x="630" y="382" font-family="Inter, Arial, sans-serif" font-size="14" fill="#eef2ff">Lead with domain overlap and rapid</text>
  <text x="630" y="402" font-family="Inter, Arial, sans-serif" font-size="14" fill="#eef2ff">prototype discipline.</text>
  <rect x="610" y="448" width="288" height="18" rx="9" fill="rgba(255,255,255,0.08)" />
  <rect x="610" y="448" width="210" height="18" rx="9" fill="url(#accent)" />
</svg>
